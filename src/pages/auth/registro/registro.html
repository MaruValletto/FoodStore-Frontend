<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../style.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="brand-name">Food<span class="accent">Store</span></span>
            </div>
            <h2 class="auth-title">Crear Cuenta</h2>
            <p id="error-msg" class="auth-error" style="display:none;"></p>
            <form id="registro-form">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Tu apellido" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input type="password" id="password" placeholder="Minimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn-primary btn-full">Registrarme</button>
            </form>
            <p class="auth-switch">Ya tenes cuenta? <a href="../login/login.html">Iniciar sesion</a></p>
        </div>
    </div>
    <script type="module" src="./registro.ts"></script>
</body>
</html>
