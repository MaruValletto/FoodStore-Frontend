<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Pedidos Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../style.css">
</head>
<body class="admin-body">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-logo"><span class="brand-name">Food<span class="accent">Store</span></span></div>
            <nav class="sidebar-nav">
                <a href="../adminHome/adminHome.html" class="sidebar-link">Dashboard</a>
                <a href="../categories/categories.html" class="sidebar-link">Categorias</a>
                <a href="../products/products.html" class="sidebar-link">Productos</a>
                <a href="./orders.html" class="sidebar-link active">Pedidos</a>
                <a href="../../store/home/home.html" class="sidebar-link">Ver Tienda</a>
            </nav>
            <button id="btn-logout" class="btn-logout sidebar-logout">Cerrar sesion</button>
        </aside>
        <main class="admin-main">
            <h1 class="admin-title">Gestion de Pedidos</h1>
            <div class="filter-bar">
                <select id="filter-estado">
                    <option value="">Todos los pedidos</option>
                    <option value="PENDIENTE">Pendiente</option>
                    <option value="CONFIRMADO">Confirmado</option>
                    <option value="TERMINADO">Terminado</option>
                    <option value="CANCELADO">Cancelado</option>
                </select>
            </div>
            <div id="orders-list"></div>
        </main>
    </div>
    <div id="order-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <button id="close-order-modal" class="modal-close">&times;</button>
            <div id="order-modal-content"></div>
        </div>
    </div>
    <script type="module" src="./orders.ts"></script>
</body>
</html>
