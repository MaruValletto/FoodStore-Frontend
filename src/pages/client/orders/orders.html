<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - Food Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="brand-name">Food<span class="accent">Store</span></span>
            </div>
            <div class="nav-links">
                <a href="../../store/home/home.html" class="nav-link">Catalogo</a>
                <a href="../../store/cart/cart.html" class="nav-link">Carrito</a>
                <a href="#" class="nav-link active">Mis Pedidos</a>
                <button id="btn-logout" class="btn-logout">Salir</button>
            </div>
        </div>
    </header>
    <main class="orders-container">
        <h2>Mis Pedidos</h2>
        <div class="filter-bar">
            <select id="filter-estado">
                <option value="">Todos</option>
                <option value="PENDIENTE">Pendiente</option>
                <option value="CONFIRMADO">Confirmado</option>
                <option value="TERMINADO">Terminado</option>
                <option value="CANCELADO">Cancelado</option>
            </select>
        </div>
        <div id="orders-list"></div>
        <!-- Modal detalle -->
        <div id="order-modal" class="modal-overlay" style="display:none;">
            <div class="modal-card">
                <button id="close-order-modal" class="modal-close">&times;</button>
                <div id="order-modal-content"></div>
            </div>
        </div>
    </main>
    <script type="module" src="./orders.ts"></script>
</body>
</html>
