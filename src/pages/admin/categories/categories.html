<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Categorias</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../style.css">
</head>
<body class="admin-body">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-logo"><span class="brand-name">Food<span class="accent">Store</span></span></div>
            <nav class="sidebar-nav">
                <a href="../adminHome/adminHome.html" class="sidebar-link">Dashboard</a>
                <a href="./categories.html" class="sidebar-link active">Categorias</a>
                <a href="../products/products.html" class="sidebar-link">Productos</a>
                <a href="../orders/orders.html" class="sidebar-link">Pedidos</a>
                <a href="../../store/home/home.html" class="sidebar-link">Ver Tienda</a>
            </nav>
            <button id="btn-logout" class="btn-logout sidebar-logout">Cerrar sesion</button>
        </aside>
        <main class="admin-main">
            <div class="admin-page-header">
                <h1>Gestion de Categorias</h1>
                <button id="btn-new-cat" class="btn-primary">+ Nueva Categoria</button>
            </div>
            <table class="admin-table">
                <thead><tr><th>ID</th><th>Imagen</th><th>Nombre</th><th>Descripcion</th><th>Acciones</th></tr></thead>
                <tbody id="cat-table-body"></tbody>
            </table>
        </main>
    </div>
    <!-- Modal -->
    <div id="cat-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3 id="modal-title">Nueva Categoria</h3>
            <button id="close-cat-modal" class="modal-close">&times;</button>
            <div class="form-group"><label>Nombre</label><input type="text" id="cat-nombre" required></div>
            <div class="form-group"><label>Descripcion</label><textarea id="cat-desc"></textarea></div>
            <div class="form-group"><label>URL de imagen</label><input type="text" id="cat-imagen" placeholder="https://..."></div>
            <p id="cat-error" class="auth-error" style="display:none;"></p>
            <button id="btn-save-cat" class="btn-primary btn-full">Guardar</button>
        </div>
    </div>
    <script type="module" src="./categories.ts"></script>
</body>
</html>
